name: Tests

on: [push, pull_request]

jobs:
  test-checkin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Test AppForCheckin
        run: mvn test
        working-directory: AppForCheckin

  test-lanesmanager:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Test AppForLanesManager
        run: mvn test
        working-directory: AppForLanesManager
